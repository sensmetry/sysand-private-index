# Who may publish what. The writer refuses any submission whose publisher
# namespace (the first path segment under inbox/) is not declared here.
#
# WHO may submit for a declared namespace is enforced by pull-request
# review: give each namespace an owning team in .github/CODEOWNERS.
#
# Fields other than the table name are informational today — they document
# intent for reviewers (where publishes come from, who to ask). Keep them
# accurate; future sysand publishing tooling is expected to verify them.

[publishers.example-publisher]
# Source repository this publisher's projects are released from.
repository = "YOUR-ORG/example-models"
maintainers = ["@alice"]
