name: validate-submission
# Fast feedback on pull requests: validates each submission and dry-runs
# the publish, so a bad submission fails the check before merge. The
# report is printed in this job's log. Rejects modifications to
# already-published KPARs.
on:
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install sysand
        # Needed for the publish dry-run; pin the same version as the index-writer.
        run: pipx install sysand==0.1.6
      - name: Validate submissions
        run: ./manage_index.py validate "origin/${{ github.base_ref }}"
