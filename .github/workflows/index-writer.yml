name: index-writer
# The index-writer: runs on every push to main and reconciles the generated
# `index` branch against kpars/ - anything not yet published gets
# published; everything else is a no-op. Idempotent; never writes to main.
on:
  push:
    branches: [main]

concurrency:
  group: index-writer
  cancel-in-progress: false # queue, never cancel a write in flight

jobs:
  reconcile:
    runs-on: ubuntu-latest
    permissions:
      contents: write # lets the job push to the index branch
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install sysand
        # Adjust to how you distribute sysand internally; pin the version.
        run: pipx install sysand==0.1.5

      - name: Reconcile index with kpars/
        run: ./manage_index.py reconcile
