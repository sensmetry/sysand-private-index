name: index-writer
# The writer: triggered by pushes to staging, serialized by the concurrency
# group, and the only thing that writes to main.
on:
  push:
    branches: [staging]

concurrency:
  group: index-writer
  cancel-in-progress: false # queue, never cancel a write in flight

# contents: write covers the github.token fallback below; when
# INDEX_WRITER_TOKEN is set, pushes use it instead and this could be
# narrowed back to contents: read.
permissions:
  contents: write

jobs:
  process-inbox:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: staging
          fetch-depth: 0
          # Production setup: INDEX_WRITER_TOKEN = fine-grained PAT
          # (contents: read/write) or GitHub App token of an identity
          # allowed to push to the PROTECTED main branch.
          # Fallback github.token works only while main is unprotected
          # (test setups), and its pushes trigger no downstream workflows
          # (recursion guard) — fine for raw-based reads, a trap if you
          # add a Pages deploy.
          token: ${{ secrets.INDEX_WRITER_TOKEN || github.token }}

      - name: Install sysand
        # Adjust to how you distribute sysand internally; pin the version.
        run: pipx install sysand==0.1.5

      - name: Process inbox
        run: python3 scripts/index_ci.py process-inbox
