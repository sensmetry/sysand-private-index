name: index-writer
# The writer: runs on every push to main, publishes inbox/ submissions to
# the generated `index` branch, then clears the inbox. Serialized by the
# concurrency group. No-ops when the inbox is empty.
on:
  push:
    branches: [main]

concurrency:
  group: index-writer
  cancel-in-progress: false # queue, never cancel a write in flight

jobs:
  process-inbox:
    runs-on: ubuntu-latest
    permissions:
      contents: write # lets the job push to the index branch and clear inbox/
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install sysand
        # Adjust to how you distribute sysand internally; pin the version.
        run: pipx install sysand==0.1.5

      - name: Process inbox
        run: scripts/index_ci.py process-inbox
