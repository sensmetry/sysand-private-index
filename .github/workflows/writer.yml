name: index-writer
# The writer: triggered by pushes to staging, serialized by the concurrency
# group, and the only thing that writes to main.
on:
  push:
    branches: [staging]

concurrency:
  group: index-writer
  cancel-in-progress: false # queue, never cancel a write in flight

jobs:
  process-inbox:
    runs-on: ubuntu-latest
    permissions:
      contents: write # lets the job push to main and staging
    steps:
      - uses: actions/checkout@v7
        with:
          ref: staging
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install sysand
        # Adjust to how you distribute sysand internally; pin the version.
        run: pipx install sysand==0.1.5

      - name: Process inbox
        run: scripts/index_ci.py process-inbox
